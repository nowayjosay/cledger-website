<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>Cledger</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: #f8fafc;
        color: #0f172a;
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
      }

      main {
        width: 100%;
        max-width: 680px;
        padding: 48px 24px;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 20px;
        box-shadow: 0 12px 35px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2.5rem, 8vw, 4.5rem);
        color: #3b82f6;
      }

      .tagline {
        margin: 0 0 24px;
        color: #10b981;
        font-size: 1.25rem;
        font-weight: 700;
      }

      .message {
        margin: 0;
        color: #475569;
        font-size: 1.05rem;
        line-height: 1.7;
      }
    </style>
  </head>

  <body>
    <main>
      <h1>Cledger</h1>
      <p class="tagline">Sea your cash flow.</p>
      <p class="message">
        The official Cledger website is coming soon.
      </p>
    </main>
  </body>
</html>
